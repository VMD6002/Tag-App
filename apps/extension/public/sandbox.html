<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sandbox</title>
  </head>
  <body>
    <script>
      const AsyncFunction = Object.getPrototypeOf(
        async function () {},
      ).constructor;
      // Listen for the code and data from the parent React window
      window.addEventListener("message", (event) => {
        const { script, data } = event.data;

        try {
          // Create a function wrapper so the user code can access the data
          // and run in its own scope.
          const runner = new AsyncFunction(
            "data",
            `
            try {
              ${script}
            } catch (err) {
              console.error("Error executing user code:", err);
            }
          `,
          );

          // Execute the code, passing the extension data as an argument
          runner(data);
        } catch (compileError) {
          console.error("Compilation Error:", compileError);
        }
      });
    </script>
  </body>
</html>
